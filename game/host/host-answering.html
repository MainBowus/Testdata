<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Answering – DataQuiz</title>
  <link rel="stylesheet" href="../css/host-answering.css" />
</head>
<body>

  <div class="hq-bg"></div>

  <div class="hq-hud">
    <div class="hud-left">
      <div class="hud-box" id="hud-type">Multiple Choice</div>
    </div>
    <div class="hud-right">
      <div class="hud-box" id="hud-timer">TIME 30</div>
      <div class="hud-box" id="hud-progress">1 / 10</div>
    </div>
  </div>

  <main class="hq-main">
    <div class="question-container">
      <div class="question-text-box" id="q-text">What is this character called?</div>
    </div>

    <div class="question-image-area" id="q-image-wrap">
      <img id="q-image" src="" alt="Question image" />
    </div>

    <div class="answers-grid" id="answers-grid">
      <div class="answer-card" id="ans-0">Answer 1</div>
      <div class="answer-card" id="ans-1">Answer 2</div>
      <div class="answer-card" id="ans-2">Answer 3</div>
      <div class="answer-card" id="ans-3">Answer 4</div>
    </div>
  </main>

  <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
  <script src="../js/host-answering.js"></script>
</body>
</html>
