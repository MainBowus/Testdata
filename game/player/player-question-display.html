<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Question Display – DataQuiz</title>
  <link rel="stylesheet" href="../css/host-question-display.css" />
  <link rel="stylesheet" href="../css/player-lobby.css" />
  <style>
    .hq-hud { display:flex;justify-content:space-between;align-items:center;padding:20px 30px; }
    .hud-right { display:flex;gap:10px; }
    .hud-box { background:#1c2c43;padding:10px 20px;border:1.5px solid #000;font-size:20px;color:#fff;font-family:'Archivo Black',sans-serif; }
    .hq-main { padding-top:0; }
    .question-text-box { border-radius:25px;padding:15px 40px;font-size:42px;border:2px solid #000;animation:floatUpDown 3s ease-in-out infinite; }
    @media (max-width:600px) {
      .question-text-box { font-size:24px;padding:15px 25px;width:95%; }
      .question-image-area { max-width:95%;height:250px; }
      .hud-box { font-size:14px;padding:8px 12px; }
      .user-badge { font-size:14px;padding:8px 15px; }
    }
  </style>
</head>
<body>
  <div class="hq-bg" style="position:fixed;inset:0;z-index:-1;background:linear-gradient(135deg,#05162a 0%,#0d2137 50%,#162e4a 100%);"></div>

  <div class="hq-hud">
    <div class="hud-left">
      <div class="user-badge" id="display-name">Username</div>
    </div>
    <div class="hud-right">
      <div class="hud-box">TIME 30</div>
      <div class="hud-box" id="hud-progress">1 / 10</div>
      <div class="hud-box" id="hud-stats">#1 Score 0</div>
    </div>
  </div>

  <main class="hq-main">
    <div class="question-container">
      <div class="question-text-box" id="q-text">What is this character called?</div>
    </div>
    <div class="question-image-area" id="q-image-wrap">
      <img id="q-image" src="" alt="Question image" />
    </div>
  </main>

  <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
  <script src="../js/player-question-display.js"></script>
</body>
</html>
