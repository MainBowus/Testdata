<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Final Summary – DataQuiz</title>
  <link rel="stylesheet" href="../css/host-question-display.css" />
  <link rel="stylesheet" href="../css/player-lobby.css" />
  <link rel="stylesheet" href="../css/player-final.css?v=3" />
</head>
<body>
  <div class="hq-bg" style="position:fixed;inset:0;z-index:-1;background:linear-gradient(135deg,#05162a 0%,#0d2137 50%,#162e4a 100%);"></div>

  <div class="hq-hud">
    <div class="hud-left">
      <div class="user-badge" id="display-name">Username</div>
    </div>
    <div class="hud-right">
      <div class="hud-box" id="hud-stats">#1 Score</div>
    </div>
  </div>

  <main class="player-main">
    <div class="final-text-section">
      <h1 class="finished-text">You finished <span id="final-rank">00th</span></h1>
      <p class="thanks-text">Thank you for playing!</p>
    </div>
  </main>

  <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
  <script src="../js/player-final.js"></script>
</body>
</html>
