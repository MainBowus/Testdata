<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Waiting... – DataQuiz</title>
  <link rel="stylesheet" href="../css/host-question-display.css" />
  <link rel="stylesheet" href="../css/player-lobby.css" />
  <link rel="stylesheet" href="../css/player-answering.css?v=4" />
  <link rel="stylesheet" href="../css/player-waiting-ans.css?v=3" />
</head>
<body>
  <div class="blurred-content no-animation">
    <div class="hq-hud">
      <div class="hud-left">
        <div class="user-badge" id="display-name">Username</div>
      </div>
      <div class="hud-right">
        <div class="hud-box">TIME 0</div>
        <div class="hud-box" id="hud-progress">1 / 10</div>
        <div class="hud-box" id="hud-stats">#1 Score 0</div>
      </div>
    </div>
    <main class="player-main">
      <div class="question-container">
        <div class="question-text-box" id="q-text">What is this character called?</div>
      </div>
      <div class="question-image-area" id="q-image-wrap">
        <img id="q-image" src="" alt="Question image" />
      </div>
      <div class="answer-grid" id="multiple-choice-grid">
        <button class="ans-btn">Answer 1</button>
        <button class="ans-btn">Answer 2</button>
        <button class="ans-btn">Answer 3</button>
        <button class="ans-btn">Answer 4</button>
      </div>
      <div class="open-ended-area" id="open-ended-area" style="display:none;width:100%;max-width:800px;gap:20px;flex-direction:column;align-items:center;">
        <input type="text" placeholder="Type your answer here..." style="width:100%;padding:20px;border-radius:15px;border:2px solid #000;font-family:'Archivo Black',sans-serif;font-size:28px;background:var(--box-bg);color:#fff;text-align:center;" disabled />
        <button class="ans-btn" style="text-align:center;width:200px;">SUBMIT</button>
      </div>
    </main>
  </div>

  <div class="waiting-overlay">
    <div class="overlay-content">
      <h1>Waiting for the answers</h1>
      <div class="spinner">
        <div class="bar1"></div><div class="bar2"></div><div class="bar3"></div><div class="bar4"></div>
        <div class="bar5"></div><div class="bar6"></div><div class="bar7"></div><div class="bar8"></div>
        <div class="bar9"></div><div class="bar10"></div><div class="bar11"></div><div class="bar12"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
  <script src="../js/player-waiting-ans.js"></script>
</body>
</html>
