<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuizDATA – Login / Sign up</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body>

  <!-- BACKGROUND -->
  <div class="bg"></div>

  <!-- NAVBAR (Same as Explore) -->
  <nav class="navbar">
    <a href="index.html" class="navbar-logo">
      <img src="assets/images/logo.png" alt="QuizDATA Logo" />
    </a>

    <div class="nav-btns">
      <a href="dashboard/explore.html" class="nav-btn nav-btn-explore">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        <span>Explore</span>
      </a>
      <a href="dashboard/create-quiz.html" class="nav-btn nav-btn-create">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="16"></line><line x1="8" y1="12" x2="16" y2="12"></line></svg>
        <span>Create</span>
      </a>
      <a href="dashboard/join.html" class="nav-btn nav-btn-join">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="20" height="12" rx="2"></rect><path d="M6 12h4M8 10v4M15 13a1 1 0 1 0 0-2 1 1 0 0 0 0 2zm3-3a1 1 0 1 0 0-2 1 1 0 0 0 0 2z"></path></svg>
        <span>Join</span>
      </a>
    </div>

    <div class="nav-right">
      <a href="auth.html" class="nav-login">Log in</a>
    </div>
  </nav>

  <div class="auth-page">
    <div class="auth-card">

      <div class="card-logo">
        <img src="assets/images/logo.png" alt="Logo" />
      </div>

      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-signup" onclick="switchTab('signup')">Sign up</button>
        <button class="auth-tab"        id="tab-login"  onclick="switchTab('login')">Log in</button>
      </div>

      <!-- ===== LOGIN FORM ===== -->
      <div id="form-login" style="display:none">
        <div class="form-group">
          <label>Email</label>
          <input class="form-input" id="login-email"    type="email"    placeholder="Enter your email" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <div class="input-wrap">
            <input class="form-input" id="login-password" type="password" placeholder="Enter your password" />
            <button class="eye-btn" type="button" onclick="togglePw('login-password', this)"></button>
          </div>
          <div class="forgot"><a href="#">Forgot password</a></div>
        </div>

        <button class="btn-primary"  onclick="handleLogin()">Log in</button>

        <div class="auth-or-text">Are you new? <a onclick="switchTab('signup')">Create an account</a></div>
        <div class="divider"></div>
        <div class="auth-or-text small">or email</div>

        <button class="btn-google" onclick="handleGoogle()">
          <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.08 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-3.59-13.46-8.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
          Log in with Google
        </button>
      </div>

      <!-- ===== SIGNUP FORM ===== -->
      <div id="form-signup">
        <div class="form-group">
          <label>Username</label>
          <input class="form-input" id="signup-name"     type="text"     placeholder="Enter your username" />
        </div>
        <div class="form-group">
          <label>Email</label>
          <input class="form-input" id="signup-email"    type="email"    placeholder="Enter your email address" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <div class="input-wrap">
            <input class="form-input" id="signup-password" type="password" placeholder="Enter your password" />
            <button class="eye-btn" type="button" onclick="togglePw('signup-password', this)"></button>
          </div>
        </div>

        <button class="btn-primary" onclick="handleSignup()">Sign up</button>

        <div class="divider"></div>
        <div class="auth-or-text small">or email</div>

        <button class="btn-google" onclick="handleGoogle()">
          <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.08 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-3.59-13.46-8.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
          Continue with Google
        </button>
      </div>

    </div>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>


  <script src="js/auth.js"></script>
</body>
</html>
